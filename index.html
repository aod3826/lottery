<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สลากออนไลน์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Kanit', sans-serif; background: #f0fdf4; }
    .sidebar { width: 0; transition: width .3s; overflow: hidden; flex-shrink: 0; }
    .sidebar.open { width: 250px; }
    @media (min-width: 768px) { .sidebar { width: 250px !important; } }
  </style>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar fixed top-0 left-0 h-full bg-green-900 text-white z-20 overflow-y-auto">
    <div class="p-4 text-center border-b border-green-700">
      <h2 class="text-xl font-bold">เมนูระบบ</h2>
    </div>
    <nav id="sidebar-nav" class="mt-4"></nav>
  </aside>

  <!-- Main wrap -->
  <div id="main-wrap" class="flex-1 flex flex-col min-h-screen md:ml-[250px]">

    <!-- Top bar -->
    <header class="bg-green-800 shadow sticky top-0 z-10">
      <div class="px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <button id="menu-toggle" class="text-white text-xl md:hidden">
            <i class="fas fa-bars"></i>
          </button>
          <span class="text-white font-bold hidden md:block">รับไม่อั้นหวยออนไลน์</span>
        </div>
        <div id="user-bar" class="hidden text-right text-white text-sm">
          <p class="font-semibold">สวัสดี, <span id="lbl-name"></span></p>
          <p>เครดิต: <span id="lbl-credit" class="font-mono">0.00</span> บาท</p>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-4 md:p-6">

      <!-- Login -->
      <div id="pg-login" class="page">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8 mt-10">
          <h2 class="text-3xl font-bold text-center text-green-800 mb-8">เข้าสู่ระบบ</h2>
          <form id="form-login">
            <input type="text"     id="inp-username" placeholder="ชื่อผู้ใช้งาน"
                   class="w-full mb-4 px-4 py-3 border rounded-lg outline-none focus:ring-4 focus:ring-green-200" required>
            <input type="password" id="inp-password" placeholder="รหัสผ่าน"
                   class="w-full mb-6 px-4 py-3 border rounded-lg outline-none focus:ring-4 focus:ring-green-200" required>
            <button type="submit"
                    class="w-full bg-green-700 text-white py-3 rounded-lg text-lg font-semibold hover:bg-green-800 transition">
              เข้าสู่ระบบ
            </button>
          </form>
          <p class="text-center mt-5 text-sm">
            ยังไม่มีบัญชี?
            <a href="#" id="lnk-to-register" class="text-green-600 font-bold hover:underline">สมัครสมาชิกที่นี่</a>
          </p>
        </div>
      </div>

      <!-- Register -->
      <div id="pg-register" class="page hidden">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8 mt-10">
          <h2 class="text-3xl font-bold text-center text-green-800 mb-6">สมัครสมาชิก</h2>
          <form id="form-register">
            <input type="text"     name="username"    placeholder="Username"         class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <input type="password" name="password"    placeholder="รหัสผ่าน"         class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <input type="text"     name="fullName"    placeholder="ชื่อ-สกุล"        class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <input type="tel"      name="phone"       placeholder="เบอร์โทรศัพท์"    class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <input type="text"     name="bankName"    placeholder="ชื่อธนาคาร"       class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <input type="text"     name="bankAccount" placeholder="เลขบัญชีธนาคาร"  class="w-full mb-4 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-400" required>
            <div class="mb-5">
              <label class="block text-gray-700 font-medium mb-1">รูปถ่ายบัตรประชาชน (ไม่บังคับ)</label>
              <input type="file" name="idCardPhoto" accept="image/*"
                     class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
            </div>
            <button type="submit"
                    class="w-full bg-green-700 text-white py-3 rounded-lg text-lg font-semibold hover:bg-green-800 transition">
              สมัครสมาชิก
            </button>
          </form>
          <p class="text-center mt-4 text-sm">
            มีบัญชีแล้ว?
            <a href="#" id="lnk-to-login" class="text-green-600 font-bold hover:underline">เข้าสู่ระบบที่นี่</a>
          </p>
        </div>
      </div>

      <!-- Member -->
      <div id="pg-member" class="page hidden">
        <div id="member-area"></div>
      </div>

      <!-- Admin -->
      <div id="pg-admin" class="page hidden">
        <div id="admin-area" class="bg-white p-6 rounded-xl shadow-lg">
          <p>ยินดีต้อนรับผู้ดูแลระบบ กรุณาเลือกเมนูจากด้านข้าง</p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ✅ โหลด JS ตามลำดับ (api.js ต้องมาก่อน) -->
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/member_views.js"></script>
<script src="js/admin_views.js"></script>
<script src="js/handlers.js"></script>

</body>
</html>
