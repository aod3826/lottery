<script>
// =================================================================
// js_app.html — State / Navigation / Sidebar / Utilities
// =================================================================

// ---------- State ----------
const App = {
  isLoggedIn: false,
  role:       null,   // 'admin' | 'member'
  user:       null,   // { id, name, credit }
};

// ---------- Utilities ----------
function fmtDate(iso) {
  if (!iso) return 'N/A';
  try {
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleDateString('th-TH', {
      year:'numeric', month:'numeric', day:'numeric',
      hour:'2-digit', minute:'2-digit',
    });
  } catch (_) { return iso; }
}

function fmtMoney(n) { return parseFloat(n || 0).toFixed(2); }

function loading(title = 'กำลังดำเนินการ...') {
  Swal.fire({ title, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
}

function gasRun(fn, ...args) {
  return new Promise((resolve, reject) => {
    let runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn](...args);
  });
}

// ---------- Navigation ----------
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.getElementById(id)?.classList.remove('hidden');
}

// ---------- Top-bar credit ----------
function refreshTopBar() {
  const bar = document.getElementById('user-bar');
  if (!App.isLoggedIn) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('lbl-name').textContent   = App.user?.name || App.role;
  document.getElementById('lbl-credit').textContent = fmtMoney(App.user?.credit);
}

// ---------- Sidebar ----------
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  const MEMBER_MENUS = [
    ['ซื้อเลขรางวัล',      'fa-ticket-alt',         () => loadMember('buy')],
    ['เติมเครดิต',          'fa-wallet',              () => loadMember('deposit')],
    ['ถอนเครดิต',           'fa-money-bill-wave',     () => loadMember('withdraw')],
    ['ประวัติซื้อสลาก',     'fa-history',             () => loadMember('purchase-history')],
    ['ประวัติเติม/ถอน',     'fa-exchange-alt',        () => loadMember('tx-history')],
  ];

  const ADMIN_MENUS = [
    ['จัดการสมาชิก',        'fa-users',               () => loadAdmin('members')],
    ['อนุมัติเติมเงิน',     'fa-check-circle',        () => loadAdmin('approve-deposits')],
    ['อนุมัติถอนเงิน',      'fa-minus-circle',        () => loadAdmin('approve-withdrawals')],
    ['ประวัติเติมเงิน',     'fa-clock-rotate-left',   () => loadAdmin('deposit-history')],
    ['ประวัติถอนเงิน',      'fa-list-alt',            () => loadAdmin('withdrawal-history')],
    ['จัดการบัญชีธนาคาร',  'fa-university',           () => loadAdmin('banks')],
    ['จัดการประเภทสลาก',   'fa-tags',                 () => loadAdmin('lottery-types')],
    ['ประกาศผลรางวัล',      'fa-trophy',              () => loadAdmin('announce')],
    ['รายงานสมาชิก',        'fa-chart-bar',           () => loadAdmin('report')],
  ];

  const menus = App.role === 'admin' ? ADMIN_MENUS : MEMBER_MENUS;

  menus.forEach(([label, icon, handler]) => {
    nav.appendChild(_navLink(label, icon, handler));
  });
  nav.appendChild(_navLink('ออกจากระบบ', 'fa-sign-out-alt', handleLogout));
}

function _navLink(label, icon, handler) {
  const a = document.createElement('a');
  a.href = '#';
  a.className = 'flex items-center px-4 py-3 text-white hover:bg-green-700 transition';
  a.innerHTML = `<i class="fas ${icon} w-6 text-center"></i><span class="ml-3">${label}</span>`;
  a.onclick = e => {
    e.preventDefault();
    handler();
    if (window.innerWidth < 768)
      document.getElementById('sidebar').classList.remove('open');
  };
  return a;
}

// ---------- Login / Logout flow ----------
function onLoginSuccess(res) {
  App.isLoggedIn = true;
  App.role       = res.role;
  App.user       = res.memberInfo || { name: 'Admin', credit: 0 };

  buildSidebar();
  refreshTopBar();

  if (App.role === 'admin') {
    showPage('pg-admin');
    loadAdmin('members');
  } else {
    showPage('pg-member');
    loadMember('buy');
  }
}

function handleLogout() {
  Swal.fire({
    title: 'ออกจากระบบ?', icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33', cancelButtonColor: '#6b7280',
    confirmButtonText: 'ใช่', cancelButtonText: 'ยกเลิก',
  }).then(r => {
    if (!r.isConfirmed) return;
    App.isLoggedIn = false; App.role = null; App.user = null;
    document.getElementById('form-login').reset();
    document.getElementById('user-bar').classList.add('hidden');
    document.getElementById('sidebar-nav').innerHTML = '';
    showPage('pg-login');
  });
}

// ---------- Content loaders ----------
function loadMember(view) {
  const area = document.getElementById('member-area');
  area.innerHTML = _spinner();

  const uid = App.user?.id;
  const loaders = {
    'buy':              () => gasRun('getLotteryTypes').then(renderBuyLottery),
    'deposit':          () => gasRun('getBankAccounts').then(renderDepositForm),
    'withdraw':         () => renderWithdrawForm(area),
    'purchase-history': () => gasRun('getMemberPurchaseHistory', uid).then(data => renderPurchaseHistory(area, data)),
    'tx-history':       () => gasRun('getMemberHistory', uid).then(data => renderTxHistory(area, data)),
  };

  (loaders[view] || (() => { area.innerHTML = '<p>ไม่พบเนื้อหา</p>'; }))()
    .catch(err => { area.innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`; });
}

function loadAdmin(view) {
  const area = document.getElementById('admin-area');
  area.innerHTML = _spinner();

  const loaders = {
    'members':             () => gasRun('getAllMembers').then(renderMembersTable),
    'approve-deposits':    () => gasRun('getPendingDeposits').then(renderPendingDeposits),
    'approve-withdrawals': () => gasRun('getPendingWithdrawals').then(renderPendingWithdrawals),
    'deposit-history':     () => gasRun('getDepositHistory').then(renderDepositHistory),
    'withdrawal-history':  () => gasRun('getWithdrawalHistory').then(renderWithdrawalHistory),
    'banks':               () => gasRun('getBankAccounts', true).then(renderBanks),
    'lottery-types':       () => gasRun('getLotteryTypes').then(renderLotteryTypes),
    'announce':            () => Promise.all([
                                   gasRun('getLotteryTypes'),
                                   gasRun('getPastAnnouncements'),
                                 ]).then(([types, past]) => renderAnnounce(types, past)),
    'report':              () => gasRun('getMemberReport').then(renderReport),
  };

  (loaders[view] || (() => { area.innerHTML = '<p>ยังไม่พร้อมใช้งาน</p>'; }))()
    .catch(err => { area.innerHTML = `<p class="text-red-600">Error: ${err.message}</p>`; });
}

// ---------- Micro-utils ----------
function _spinner() {
  return `<div class="text-center p-8 text-green-700">
    <i class="fas fa-spinner fa-spin text-3xl"></i>
    <p class="mt-2">กำลังโหลด...</p>
  </div>`;
}

function _statusBadge(status) {
  const map = {
    Approved: 'text-green-700 bg-green-100',
    Pending:  'text-yellow-700 bg-yellow-100',
    Won:      'text-green-700 bg-green-100',
    Lost:     'text-red-700 bg-red-100',
    Rejected: 'text-red-700 bg-red-100',
  };
  const cls = map[status] || 'text-gray-700 bg-gray-100';
  return `<span class="px-2 py-1 text-xs font-semibold rounded-full ${cls}">${status}</span>`;
}

function _tbl(headers, rows, emptyMsg = 'ไม่พบข้อมูล') {
  const ths = headers.map(h => `<th class="px-4 py-3">${h}</th>`).join('');
  const trs = rows.length
    ? rows.map(r => `<tr class="border-b hover:bg-gray-50">${r.map(td => `<td class="px-4 py-2">${td}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${headers.length}" class="text-center p-4 text-gray-500">${emptyMsg}</td></tr>`;
  return `<div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left text-gray-600">
      <thead class="text-xs text-gray-700 uppercase bg-gray-200"><tr>${ths}</tr></thead>
      <tbody>${trs}</tbody>
    </table>
  </div>`;
}

// ---------- Bootstrap ----------
document.addEventListener('DOMContentLoaded', () => {
  // Mobile menu toggle
  document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  // Close sidebar on outside click (mobile)
  document.getElementById('main-wrap').addEventListener('click', e => {
    if (window.innerWidth < 768 &&
        !e.target.closest('#sidebar') &&
        !e.target.closest('#menu-toggle')) {
      document.getElementById('sidebar').classList.remove('open');
    }
  });

  // Nav links login ↔ register
  document.getElementById('lnk-to-register').addEventListener('click', e => {
    e.preventDefault(); showPage('pg-register');
  });
  document.getElementById('lnk-to-login').addEventListener('click', e => {
    e.preventDefault(); showPage('pg-login');
  });

  // Form submissions
  document.getElementById('form-login').addEventListener('submit', handleLogin);
  document.getElementById('form-register').addEventListener('submit', handleRegister);

  // Dynamic submit delegation
  document.getElementById('member-area').addEventListener('submit', e => {
    if (e.target.id === 'form-deposit')  { e.preventDefault(); handleDepositSubmit(e.target); }
    if (e.target.id === 'form-withdraw') { e.preventDefault(); handleWithdrawSubmit(e.target); }
  });
  document.getElementById('admin-area').addEventListener('submit', e => {
    if (e.target.id === 'form-bank')         { e.preventDefault(); handleBankFormSubmit(e.target); }
    if (e.target.id === 'form-announce')     { e.preventDefault(); handleAnnounceSubmit(e.target); }
    if (e.target.id === 'form-lottery-type') { e.preventDefault(); handleLotteryTypeSubmit(e.target); }
  });

  // Dynamic click delegation for claim button
  document.getElementById('member-area').addEventListener('click', e => {
    const btn = e.target.closest('.btn-claim');
    if (btn) handleClaim(btn.dataset.id);
  });

  // Dynamic click delegation for admin actions
  document.getElementById('admin-area').addEventListener('click', handleAdminClick);
});
</script>
